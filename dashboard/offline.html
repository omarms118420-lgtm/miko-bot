<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أنت غير متصل - بوت ميكو</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      direction: rtl;
    }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; font-weight: 800; color: #22c55e; margin-bottom: 1rem; }
    p { color: #94a3b8; font-size: 1rem; max-width: 400px; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.9rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .btn:hover { opacity: 0.85; }
    .status {
      margin-top: 2rem;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 0.8rem;
      padding: 1rem 1.5rem;
      max-width: 400px;
    }
    .status h3 { color: #22c55e; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .status p { color: #64748b; font-size: 0.85rem; margin: 0; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>لا يمكن الوصول إلى الخادم الآن. تأكد من اتصالك بالإنترنت وحاول مجدداً.</p>
  <button class="btn" onclick="window.location.reload()">
    🔄 إعادة المحاولة
  </button>
  <div class="status">
    <h3>💡 ملاحظة</h3>
    <p>التطبيق محفوظ على جهازك ويمكن تصفح الصفحات المحفوظة مسبقاً حتى بدون إنترنت.</p>
  </div>

  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
